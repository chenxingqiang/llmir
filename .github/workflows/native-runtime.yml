name: Native Runtime (optional)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      strict_prereqs:
        description: Exit 1 when llvm/toolchain prereqs are missing
        required: false
        default: false
        type: boolean

jobs:
  native-runtime:
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Check native build prerequisites
        id: prereqs
        run: |
          chmod +x scripts/check_native_build_prereqs.sh
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.strict_prereqs }}" == "true" ]]; then
            scripts/check_native_build_prereqs.sh --strict | tee native_prereqs_report.txt
          else
            scripts/check_native_build_prereqs.sh | tee native_prereqs_report.txt
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: native-prereqs-report
          path: native_prereqs_report.txt
          if-no-files-found: ignore

      - name: Install build deps
        if: steps.prereqs.outcome == 'success'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake ninja-build clang lld

      - name: Attempt MLIRLLMRuntime build
        if: steps.prereqs.outcome == 'success'
        env:
          LLMIR_ENABLE_CUDA: auto
        run: |
          chmod +x scripts/build_native_runtime.sh
          scripts/build_native_runtime.sh || echo "Native build skipped (LLVM/MLIR tree may be incomplete)"

      - name: Upload shared library artifact (if built)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: libMLIRLLMRuntime
          path: build-native/**/libMLIRLLMRuntime.so
          if-no-files-found: ignore

  python-with-native:
    runs-on: ubuntu-latest
    needs: native-runtime
    continue-on-error: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: libMLIRLLMRuntime
          path: native-lib

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test native KV when artifact exists
        run: |
          pip install -e ".[full]" pytest numpy
          SO="$(find native-lib -name 'libMLIRLLMRuntime.so' | head -1 || true)"
          if [[ -n "$SO" ]]; then
            export LLMIR_LIB_PATH="$SO"
            pytest tests/test_kv_factory.py::test_create_paged_kv_cache_native_when_lib_present -v
          else
            echo "No native artifact; skipping native KV test"
          fi
