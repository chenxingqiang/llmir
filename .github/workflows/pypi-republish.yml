name: PyPI republish (maintainer)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to rebuild and publish (e.g. v0.2.2)
        required: true
        default: v0.2.2

permissions:
  contents: read
  id-token: write

jobs:
  republish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: pypi
      url: https://pypi.org/p/llmir
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Republish preflight
        run: |
          chmod +x scripts/pypi_republish_preflight.sh
          bash scripts/pypi_republish_preflight.sh "${{ github.event.inputs.tag }}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install tomli
          pip install -e .
          pip install pytest numpy build twine
          pytest tests/test_prepare_release.py tests/test_python_version_policy.py -q
          python3 -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Verify PyPI publish
        run: |
          python3 scripts/verify_pypi_release.py --require-published --retries 6 --retry-delay 15

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pypi-release-status
          path: IEEE-conference/benchmarks/pypi_release_status.json
          if-no-files-found: warn
