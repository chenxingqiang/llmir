name: E8 GPU lab (optional)

on:
  workflow_dispatch:
    inputs:
      model:
        description: HuggingFace model id
        required: false
        default: gpt2
      backends:
        description: Comma-separated backends
        required: false
        default: hf,llmir-paged
      require_completed:
        description: Fail unless e8_empirical_gpu.json status=completed (GPU lab)
        type: boolean
        required: false
        default: false

jobs:
  e8-lab:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: ${{ !inputs.require_completed }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LLMIR and deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]"
          pip install pytest

      - name: E8 lab preflight
        env:
          E8_MODEL: ${{ github.event.inputs.model }}
          E8_BACKENDS: ${{ github.event.inputs.backends }}
        run: |
          chmod +x scripts/e8_lab_preflight.sh
          ARGS=()
          if [[ "${{ inputs.require_completed }}" == "true" ]]; then
            ARGS+=(--strict)
          fi
          bash scripts/e8_lab_preflight.sh "${ARGS[@]}"

      - name: E8 lab smoke (honest skip on CPU)
        if: inputs.require_completed == false
        env:
          E8_MODEL: ${{ github.event.inputs.model }}
          E8_BACKENDS: ${{ github.event.inputs.backends }}
        run: bash scripts/e8_lab_smoke.sh

      - name: E8 lab strict (requires CUDA)
        if: inputs.require_completed == true
        env:
          E8_MODEL: ${{ github.event.inputs.model }}
          E8_BACKENDS: ${{ github.event.inputs.backends }}
        run: bash scripts/e8_lab_run.sh

      - name: Verify E8 lab output
        if: always()
        run: |
          if [[ "${{ inputs.require_completed }}" == "true" ]]; then
            python3 scripts/verify_e8_lab.py --require-completed
          else
            python3 scripts/verify_e8_lab.py
          fi

      - name: Upload E8 JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e8-empirical-gpu-json
          path: IEEE-conference/benchmarks/e8_empirical_gpu.json
          if-no-files-found: warn
